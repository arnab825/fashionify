spring.config.import=optional:file:.env[.properties]

# ── Aiven MySQL ──────────────────────────────────────────────────────────────
# Set DATABASE_URL in .env as:
#   DATABASE_URL=jdbc:mysql://HOST:PORT/fashionify?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/fashionify?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.pool-name=FashionifyPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Hibernate automatically detects the dialect; explicit MySQLDialect setting is removed.
spring.jpa.properties.hibernate.format_sql=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
app.jwtSecret=${JWT_SECRET:fashionify5_super_secure_secret_key_that_is_at_least_32_characters}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Admin Credentials
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# Payment mode: "simulated" (default, no payment gateway needed) | "razorpay" (requires real keys)
app.payment.mode=simulated

# Razorpay Configuration (only used when app.payment.mode=razorpay)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:rzp_placeholder_secret}

# Brevo Configuration
brevo.api.key=${BREVO_API_KEY:placeholder}
brevo.from.email=${BREVO_FROM_EMAIL:info@fashionify.com}
brevo.from.name=${BREVO_FROM_NAME:Fashionify}

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Suppress Spring Security UserDetailsManager warning
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
